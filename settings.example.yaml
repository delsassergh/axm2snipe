# axm2snipe configuration
# Copy this file to settings.yaml and fill in your values.

abm:
  # Apple Business Manager / Apple School Manager API credentials
  # Generate these at https://business.apple.com or https://school.apple.com (Settings > API)
  client_id: "BUSINESSAPI.xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  key_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  # Private key for ABM API authentication. Three formats are accepted:
  #   1. File path (recommended for local use):
  private_key: "./axm2snipe.pem"
  #   2. Inline PEM with headers:
  # private_key: |
  #   -----BEGIN EC PRIVATE KEY-----
  #   MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQg...
  #   -----END EC PRIVATE KEY-----
  #   3. Bare base64 (the key body without PEM headers — useful for env vars):
  # private_key: "MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQg..."
  # AXM_ABM_PRIVATE_KEY accepts all three formats as well.

  # Seconds to wait between paginated ABM orgDevices requests during
  # download/sync. Apple's ABM API rate limit is undocumented and appears to
  # be shared across every integration polling your organization (e.g. an
  # MDM's own ABM sync), not just axm2snipe's own request rate. Raise this if
  # you see 429 RATE_LIMIT_EXCEEDED errors. Can also be set with `--delay`.
  # page_delay_seconds: 5

  # Devices per page when fetching from ABM (max 1000). Can also be set with
  # `--page-size`.
  # page_size: 100

  # How far back (in days) to scan Apple's audit events log for devices
  # released from the org. This exists because /v1/orgDevices (the bulk
  # device list) never returns released devices no matter what fields are
  # requested -- released devices are recovered separately via
  # GET /v1/auditEvents?filter[type]=DEVICE_REMOVED_FROM_ORG and then a
  # single-device lookup, which does work. Default: 1095 (3 years). Apple's
  # docs don't state a maximum query range or retention period, and the API
  # may return less history than requested. Use `import-released --csv ...`
  # once with an Apple device export to seed older releases; those records are
  # persisted in released-devices.json and preserved by future downloads.
  # release_lookback_days: 1095

snipe_it:
  # Snipe-IT instance URL (no trailing slash)
  url: "https://snipe.example.com"
  # API key from Admin > API Keys in Snipe-IT
  api_key: "your-snipe-it-api-key"

  # ID of "Apple" manufacturer in Snipe-IT
  manufacturer_id: 1

  # Default status label ID for newly created assets
  default_status_id: 1

  # Status label to apply when ABM reports a device as released from your org
  # (releasedFromOrgDateTime set) -- i.e. no longer expected to check in with
  # your MDM. Applied on create, and on update unless the asset is already in
  # some other archived-type status (Donated, Stolen, Lost, etc.), which is
  # left alone. Does NOT auto-restore the previous status if the release date
  # later clears -- that's a manual step. Leave unset to disable.
  # archived_status_id: 5

  # Category IDs for auto-created asset models
  computer_category_id: 2   # For Mac devices
  mobile_category_id: 3     # For iPhone/iPad devices

  # Custom fieldset ID to attach to newly created models
  # This allows custom fields (like AppleCare data) to appear on assets
  custom_fieldset_id: 1

sync:
  # Set to true to simulate without making changes
  dry_run: false

  # Ignore timestamps and always update Snipe-IT from ABM
  force: false

  # Enable rate limiting for Snipe-IT API calls (2 req/s, burst 5).
  # This does NOT affect ABM API pacing — see abm.page_delay_seconds above,
  # which is what to raise if you're hitting 429s from Apple.
  rate_limit: true

  # Only update existing assets, don't create new ones
  # update_only: true

  # Only sync devices that are assigned to an MDM server
  # mdm_only: true

  # Also exclude non-MDM devices from the download cache (requires mdm_only)
  # mdm_only_cache: true

  # Filter devices by product family. Leave empty to sync all.
  # Valid values: Mac, iPhone, iPad, AppleTV, Watch, Vision
  # product_families:
  #   - Mac

  # Set asset name to "Model (Color)"
  # set_name: false

  # Fetch device images from appledb.dev and attach them to newly created models.
  # Images are sourced by hardware identifier (e.g. "Mac16,10"). No-op if the
  # image cannot be fetched; does not update images on existing models.
  # model_images: false

  # Map ABM supplier to Snipe-IT supplier ID.
  # Keys can be purchaseSourceId (e.g. "1C71B60") or purchaseSourceType (e.g. "APPLE", "MANUALLY_ADDED").
  # Checked before name-based lookup and auto-creation.
  # supplier_mapping:
  #   "1C71B60": 3   # CDW-G (by purchaseSourceId)
  #   APPLE: 1       # Apple (by purchaseSourceType)
  #   MANUALLY_ADDED: 2

  # Never overwrite existing purchase_date / order_number on update.
  # First-time syncs still populate them. Useful if you manually correct
  # order info in Snipe-IT after a sync and want it preserved on re-runs.
  # preserve_order_info_on_update: false

  # Sync ABM's order_date / order_number even for devices added via
  # Apple Configurator (purchaseSourceType=MANUALLY_ADDED). By default
  # we skip these because ABM emits a synthetic enrollment ID like
  # "CE-2024-12-13-04-11-12-826" and the enrollment date — not the real
  # purchase data — which would overwrite better data already in Snipe-IT.
  # sync_configurator_order_info: false

  # Custom field mappings: Snipe-IT field name -> ABM attribute
  # Left side: Snipe-IT DB column name (e.g. _snipeit_fieldname_1)
  #            or standard Snipe-IT field (purchase_date, order_number)
  # Right side: ABM attribute name (see list below)
  #
  # ABM device attributes:
  #   serial_number, device_model, color, device_capacity, part_number,
  #   product_family, product_type, order_number, order_date,
  #   purchase_source, purchase_source_id, status, imei, meid, wifi_mac,
  #   bluetooth_mac, ethernet_mac, eid, added_to_org, released_from_org,
  #   is_released,       -- true when released_from_org has a date, else false
  #   assigned_server
  #
  # AppleDB.dev metadata (looked up by product_type, cached per run --
  # requires network access to api.appledb.dev, same source used for
  # sync.model_images):
  #   apple_model_number  -- Apple's printed regulatory model number, e.g.
  #                          "A3238" (distinct from part_number's SKU, e.g.
  #                          "MW0Y3LL/A", and from product_type's hardware
  #                          identifier, e.g. "Mac16,10")
  #   chip                -- chip/SoC name, e.g. "M4"
  #   model_year          -- year the model was released, e.g. "2024"
  #
  # AppleCare coverage (fetched per device):
  #   applecare_status, applecare_agreement, applecare_description,
  #   applecare_start, applecare_end, applecare_renewable, applecare_payment_type
  #
  # warranty_months is auto-calculated from purchase_date to applecare_end.
  #
  # Recommended Snipe-IT custom field types:
  #   Wi-Fi MAC Address    -> text, format: MAC
  #   Bluetooth MAC Addr   -> text, format: MAC
  #   Ethernet MAC Addr    -> text, format: ANY  (may be multiple, comma-separated)
  #   Color                -> text, format: ANY
  #   Storage              -> text, format: ANY
  #   Warranty End Date    -> text, format: DATE
  #   AppleCare Status     -> radio, values: Active/Inactive/Expired
  #   AppleCare Start Date -> text, format: DATE
  #   AppleCare Renewable  -> listbox, format: BOOLEAN, values: true/false
  #   AppleCare Payment    -> radio, values: Paid Up Front/Subscription/Abe Subscription/None
  #   Assigned MDM Server  -> text, format: ANY
  #   EID                  -> text, format: ANY
  #   IMEI                 -> text, format: ANY (comma-separated if multiple)
  #   MEID                 -> text, format: ANY (comma-separated if multiple)
  #   Purchase Source      -> radio, values: Apple/Reseller/Manually Added
  #   Purchase Source ID   -> text, format: ANY
  #   Apple Model Number   -> text, format: ANY  (e.g. "A3238")
  #   Chip                 -> text, format: ANY  (e.g. "M4")
  #   Model Year           -> text, format: ANY  (e.g. "2024")
  #
  # field_mapping:
  #   _snipeit_wifi_mac_1: wifi_mac
  #   _snipeit_bluetooth_mac_2: bluetooth_mac
  #   _snipeit_ethernet_mac_3: ethernet_mac
  #   _snipeit_storage_4: device_capacity
  #   _snipeit_color_5: color
  #   purchase_date: order_date
  #   order_number: order_number
  #   _snipeit_warranty_end_date_6: applecare_end
  #   _snipeit_warranty_id_7: applecare_agreement
  #   _snipeit_applecare_status_9: applecare_status
  #   _snipeit_applecare_description_10: applecare_description
  #   _snipeit_applecare_start_date_11: applecare_start
  #   _snipeit_applecare_renewable_12: applecare_renewable
  #   _snipeit_applecare_payment_type_13: applecare_payment_type
  #   _snipeit_assigned_mdm_server_14: assigned_server
  #   _snipeit_apple_model_number_15: apple_model_number
  #   _snipeit_chip_16: chip
  #   _snipeit_model_year_17: model_year

# Optional Slack webhook notifications
# Sends a message when a new device is created in Snipe-IT
# Create a webhook at https://api.slack.com/messaging/webhooks
# slack:
#   enabled: true
#   webhook_url: "your-slack-webhook-url"
